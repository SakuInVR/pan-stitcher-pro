<!doctype html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pan Stitcher Pro</title><link rel="stylesheet" href="/src/style.css"><link rel="stylesheet" href="/src/controls.css"></head>
<body><main>
  <header><span class="eyebrow">PAN STITCHER PRO</span><h1>パン動画を、<br><em>一枚絵</em>に戻す。</h1><p>上下・左右に流れるアニメ映像を、ブラウザだけで自動結合します。</p></header>
  <section class="panel">
    <label class="drop" id="drop"><input id="file" type="file" accept="video/*"><span class="drop-icon">＋</span><strong>動画を選ぶ / ここへドロップ</strong><small>MP4・WebMなど。ファイルは外部へ送信されません</small></label>
    <div id="workspace" hidden>
      <div class="preview"><video id="video" controls muted></video><div><b id="filename"></b><span id="meta"></span></div></div>
      <div class="transport" aria-label="フレーム範囲の選択">
        <div class="time-readout"><span>現在位置</span><strong id="currentTime">00:00.000</strong></div>
        <div class="frame-buttons"><button id="prevFrame" class="secondary" type="button">← 1フレーム</button><button id="nextFrame" class="secondary" type="button">1フレーム →</button></div>
        <div class="mark-buttons"><button id="markStart" class="secondary accent" type="button">現在位置を開始に</button><button id="markEnd" class="secondary accent" type="button">現在位置を終了に</button></div>
      </div>
      <p class="key-hint">停止中はキーボードの ← → でも1フレームずつ移動できます（30fps換算）</p>
      <div class="settings">
        <label>パン方向<select id="axis"><option value="vertical">上下（縦長に結合）</option><option value="horizontal">左右（横長に結合）</option></select></label>
        <label>開始秒<input id="start" type="number" value="0" min="0" step="0.1"></label>
        <label>終了秒<input id="end" type="number" min="0" step="0.1"></label>
        <label class="interval-setting">解析間隔 <strong id="intervalValue">0.15秒（約6.7枚/秒）</strong><input id="interval" type="range" value="0.15" min="0.05" max="1" step="0.05"><small>左ほど精密、右ほど高速。つまみをドラッグして調整</small></label>
      </div>
      <button id="run">一枚絵を生成</button><div id="status" aria-live="polite"></div>
    </div>
  </section>
  <section id="result" class="result" hidden><div class="result-head"><div><span class="eyebrow">RESULT</span><h2>結合できました</h2></div><button id="download">PNGで保存</button></div>
    <button id="openSeamEditor" class="edit-callout" type="button"><span><strong>ズレてますか？</strong><small>境界をピクセル単位で個別に調整しよう</small></span><b>編集する →</b></button>
    <div id="seamEditor" class="seam-editor" hidden>
      <div><span class="eyebrow">SEAM EDITOR</span><strong>境界 <span id="seamNumber">1 / 1</span></strong><small>選んだ境界より後ろだけが追従します</small><button id="closeSeamEditor" class="editor-close" type="button">編集を閉じる</button></div>
      <label>調整する境界<input id="seamSelect" type="range" min="0" max="0" value="0" step="1"></label>
      <div class="pixel-adjust"><button id="minusPixel" class="secondary" type="button">−1px</button><label>移動量<input id="seamOffset" type="number" value="0" step="1"><small id="offsetDirection">0px</small></label><button id="plusPixel" class="secondary" type="button">＋1px</button><button id="resetSeam" class="secondary" type="button">リセット</button></div>
    </div>
    <div class="canvas-wrap"><canvas id="output"></canvas></div>
  </section>
</main><canvas id="work" hidden></canvas><script type="module" src="/src/main.js"></script></body></html>
